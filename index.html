<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Directorio de sitios web: guarda y organiza enlaces por categoría y tipo." />
  <title>Directorio de Sitios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- ===== Header ===== -->
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
          </div>
          <div>
            <h1 class="brand-title">Directorio de Sitios</h1>
            <p class="brand-sub">Tu colección organizada de enlaces</p>
          </div>
        </div>

        <button id="themeToggle" class="icon-btn" type="button" aria-label="Cambiar tema" title="Cambiar tema">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== Controles ===== -->
    <section class="controls">
      <div class="container">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="searchInput" type="search" placeholder="Buscar por nombre, descripción, tipo, precio o enlace…" autocomplete="off" />
          <button id="clearSearch" class="clear-btn" type="button" aria-label="Limpiar búsqueda" title="Limpiar">×</button>
        </div>

        <div class="filter-row">
          <div class="select-wrap">
            <label for="categoryFilter" class="sr-only">Filtrar por categoría</label>
            <select id="categoryFilter">
              <option value="">Todas las categorías</option>
            </select>
            <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>

          <div class="select-wrap">
            <label for="typeFilter" class="sr-only">Filtrar por tipo</label>
            <select id="typeFilter">
              <option value="">Todos los tipos</option>
            </select>
            <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>

          <button id="addBtn" class="btn-primary" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Añadir sitio</span>
          </button>
        </div>

        <div id="resultCount" class="result-count" aria-live="polite"></div>
      </div>
    </section>

    <!-- ===== Contenido ===== -->
    <main class="container main-content">
      <div id="loadingState" class="state-box" hidden>
        <div class="spinner" role="status" aria-label="Cargando"></div>
        <p>Cargando sitios…</p>
      </div>

      <div id="errorState" class="state-box state-error" hidden>
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p id="errorText">No se pudieron cargar los sitios.</p>
        <button id="retryBtn" class="btn-secondary" type="button">Reintentar</button>
      </div>

      <div id="emptyState" class="state-box" hidden>
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <p id="emptyText">No se encontraron sitios.</p>
      </div>

      <div id="sitesContainer" aria-live="polite"></div>
    </main>

    <!-- ===== Footer ===== -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <p>Directorio de Sitios · Hecho con Vanilla JS + Google Sheets</p>
        <p class="footer-meta" id="footerMeta"></p>
      </div>
    </footer>
  </div>

  <!-- ===== Modal: Añadir sitio ===== -->
  <div id="addModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="addModalTitle" class="modal-title">Añadir nuevo sitio</h2>
        <button class="icon-btn modal-close" data-close type="button" aria-label="Cerrar">×</button>
      </div>
      <form id="addForm" class="modal-body" novalidate>
        <div class="field">
          <label for="f-name">Nombre <span class="req">*</span></label>
          <input id="f-name" name="name" type="text" required maxlength="80" placeholder="Ej. Notion" />
        </div>
        <div class="field">
          <label for="f-description">Descripción</label>
          <textarea id="f-description" name="description" rows="2" maxlength="240" placeholder="Breve descripción del sitio"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-category">Categoría <span class="req">*</span></label>
            <select id="f-category" name="category" required></select>
          </div>
          <div class="field">
            <label for="f-type">Tipo <span class="req">*</span></label>
            <select id="f-type" name="type" required></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-price">Precio</label>
            <input id="f-price" name="price" type="text" maxlength="40" placeholder="Gratis, $9.99/mes, Freemium…" />
          </div>
          <div class="field">
            <label for="f-link">Enlace <span class="req">*</span></label>
            <input id="f-link" name="link" type="url" required placeholder="https://…" />
          </div>
        </div>
        <div class="field">
          <label for="f-password">Contraseña de administrador <span class="req">*</span></label>
          <input id="f-password" name="password" type="password" required placeholder="Contraseña para añadir" />
        </div>
        <div id="formError" class="form-error" hidden></div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" data-close>Cancelar</button>
          <button type="submit" class="btn-primary" id="submitBtn">
            <span class="btn-label">Guardar sitio</span>
            <span class="spinner small" hidden></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Modal: Detalle (móvil) ===== -->
  <div id="detailModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="modal modal-detail">
      <div class="modal-header">
        <h2 id="detailTitle" class="modal-title">Detalle del sitio</h2>
        <button class="icon-btn modal-close" data-close type="button" aria-label="Cerrar">×</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
